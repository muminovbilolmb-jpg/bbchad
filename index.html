<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мобильный Мессенджер</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0b141a; color: #e9edef; display: flex; justify-content: center; height: 100vh; }
        
        .container { width: 100%; max-width: 600px; display: flex; flex-direction: column; height: 100%; background: #111b21; }
        
        /* Экран подключения */
        #setup-screen { padding: 24px; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; gap: 16px; text-align: center; }
        #setup-screen input { width: 100%; max-width: 300px; padding: 12px; border-radius: 8px; border: 1px solid #222d34; background: #2a3942; color: white; font-size: 16px; outline: none; }
        #setup-screen button { width: 100%; max-width: 300px; padding: 12px; border-radius: 8px; border: none; background: #00a884; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* Интерфейс чата */
        .chat-header { padding: 10px 16px; background: #202c33; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222d34; }
        .chat-header-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #00a884; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; }
        
        .call-btn { background: #2a3942; border: none; color: white; padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .call-btn.active { background: #ef4444; }

        .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background-image: radial-gradient(#222d34 1px, transparent 1px); background-size: 20px 20px; }
        
        .message { max-width: 75%; padding: 8px 12px; border-radius: 8px; font-size: 14px; line-height: 1.4; word-break: break-word; }
        .message.incoming { background: #202c33; align-self: flex-start; }
        .message.outgoing { background: #005c4b; align-self: flex-end; }
        .message.system { background: #2a3942; color: #8696a0; align-self: center; font-size: 12px; text-align: center; border-radius: 4px; }

        .chat-input-area { padding: 10px 16px; background: #202c33; display: flex; gap: 10px; align-items: center; }
        .chat-input-area input { flex: 1; background: #2a3942; border: none; padding: 12px 16px; border-radius: 8px; color: white; font-size: 15px; outline: none; }
        .chat-input-area button { background: #00a884; color: white; border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Шаг 1: Настройка подключения -->
        <div id="setup-screen">
            <h2>📱 Подключение к мессенджеру</h2>
            <p style="color: #8696a0; font-size: 14px;">Придумайте свой ID и укажите ID друга, чтобы созвониться или написать</p>
            <input type="text" id="my-id-input" placeholder="Ваш уникальный ID (например: user1)">
            <input type="text" id="target-id-input" placeholder="ID друга (например: user2)">
            <button onclick="startApp()">Войти в чат</button>
        </div>

        <!-- Шаг 2: Экран чата и звонков -->
        <div id="chat-screen" class="hidden" style="display:flex; flex-direction:column; height:100%;">
            <div class="chat-header">
                <div class="chat-header-info">
                    <div class="avatar">💬</div>
                    <div>
                        <div id="peer-name-label">Чат</div>
                        <div style="font-size: 11px; color: #00a884;" id="connection-status">ожидание связи...</div>
                    </div>
                </div>
                <!-- Кнопка аудиозвонка -->
                <button class="call-btn" id="call-toggle-btn" onclick="toggleCall()">📞 Звонок</button>
            </div>

            <div class="chat-messages" id="messages-box"></div>

            <div class="chat-input-area">
                <input type="text" id="msg-input" placeholder="Введите сообщение..." onkeydown="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <!-- Скрытый аудиоэлемент для голосового звонка -->
    <audio id="remote-audio" autoplay></audio>

    <!-- Подключаем PeerJS для работы P2P сетей через интернет -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script>
        let peer, conn, localStream, activeCall;
        let myId, targetId;

        function startApp() {
            myId = document.getElementById('my-id-input').value.trim();
            targetId = document.getElementById('target-id-input').value.trim();

            if (!myId || !targetId) {
                alert('Пожалуйста, заполните оба поля!');
                return;
            }

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('peer-name-label').innerText = targetId;

            // Инициализация соединения
            peer = new Peer(myId);

            peer.on('open', (id) => {
                // Автоматически пытаемся подключиться к другу для текста
                connectToPeer();
            });

            // Обработка входящего текстового соединения
            peer.on('connection', (incomingConn) => {
                conn = incomingConn;
                setupConnection();
                appendSystemMessage('Друг подключился к вам!');
            });

            // Обработка входящего голосового звонка
            peer.on('call', async (call) => {
                if (confirm('Входящий аудиозвонок! Принять?')) {
                    try {
                        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                        call.answer(localStream);
                        setupCall(call);
                        appendSystemMessage('Голосовой вызов принят');
                    } catch (err) {
                        alert('Нет доступа к микрофону!');
                    }
                } else {
                    call.close();
                }
            });
        }

        function connectToPeer() {
            conn = peer.connect(targetId);
            setupConnection();
        }

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('connection-status').innerText = 'в сети';
                appendSystemMessage('Соединение с чатом установлено!');
            });
            conn.on('data', (data) => {
                appendMessage(data, 'incoming');
            });
            conn.on('close', () => {
                document.getElementById('connection-status').innerText = 'отключен';
                appendSystemMessage('Собеседник отключился');
            });
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;

            if (conn && conn.open) {
                conn.send(text);
                appendMessage(text, 'outgoing');
                input.value = '';
            } else {
                alert('Нет соединения с собеседником. Проверьте ID!');
            }
        }

        function appendMessage(text, type) {
            const box = document.getElementById('messages-box');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function appendSystemMessage(text) {
            const box = document.getElementById('messages-box');
            const div = document.createElement('div');
            div.className = 'message system';
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // Управление звонками
        async function toggleCall() {
            if (activeCall) {
                // Завершить звонок
                if (localStream) localStream.getTracks().forEach(t => t.stop());
                activeCall.close();
                activeCall = null;
                document.getElementById('call-toggle-btn').innerText = '📞 Звонок';
                document.getElementById('call-toggle-btn').classList.remove('active');
                appendSystemMessage('Звонок завершен');
            } else {
                // Начать звонок
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    activeCall = peer.call(targetId, localStream);
                    setupCall(activeCall);
                    document.getElementById('call-toggle-btn').innerText = '📴 Сбросить';
                    document.getElementById('call-toggle-btn').classList.add('active');
                    appendSystemMessage('Идет вызов...');
                } catch (err) {
                    alert('Ошибка микрофона: ' + err.message);
                }
            }
        }

        function setupCall(call) {
            activeCall = call;
            call.on('stream', (remoteStream) => {
                const audio = document.getElementById('remote-audio');
                audio.srcObject = remoteStream;
                audio.play();
                appendSystemMessage('🎙️ Аудиосвязь активна');
            });
            call.on('close', () => {
                if (localStream) localStream.getTracks().forEach(t => t.stop());
                activeCall = null;
                document.getElementById('call-toggle-btn').innerText = '📞 Звонок';
                document.getElementById('call-toggle-btn').classList.remove('active');
            });
        }
    </script>
</body>
</html>
